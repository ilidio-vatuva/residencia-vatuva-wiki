name: Deploy Wiki.js

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            APP_DIR=~/apps/residencia-vatuva-wiki

            cd "$APP_DIR"

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies
            cd wiki
            npm ci --legacy-peer-deps --production

            cd "$APP_DIR"

            # Restart with PM2 (Wiki.js runs its own migrations on startup)
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save

            # Wait for startup and verify health
            sleep 5
            curl -sf http://localhost:8080/healthz || echo "Warning: health check failed"

            echo "Deploy complete"
